# yaml-language-server: $schema=../../Schemas/alt_game_modes.json

# Config file for various tracker lines and in game text for alt game modes.
# Note that all lines in game need to be no more than 19 characters.

# Example:
# SpazerHuntGanonIntro:
# - Text: >-
#     In game text with
#
#     each line being
#
#     19 characters
#
#     or less
#   TrackerImage:
#   AdditionalLines:
# - Text: >-
#     Another example
#
#     of in game text
#   Weight: 0.1
#   TrackerImage:
#   AdditionalLines:
#

SpazerHuntGanonIntro:
  - Text: |-
      I knew you should
      have generated this
      seed normally!
    Weight: 500
SpazerHuntGanonIntroGoalsNotMet:
  - Text: |-
      I promise the sign
      did not lie. You
      need more spazers!
    Weight: 500
SpazerHuntGameStarted:
  - Text: Great work on starting this perfectly normal seed generated by TrackGPT!
    Weight: 500
  - Text: I compiled a list of normal items for use in S M Z 3 using TrackGPT and have distributed them normally. Let's form a game plan together to collect them all.
    Weight: 500
